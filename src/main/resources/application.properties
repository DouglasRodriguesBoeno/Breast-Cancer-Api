spring.application.name=brest_cancer
server.port=${PORT:8080}

# ML Service
ml.base-url=${ML_BASE_URL:http://localhost:8001}
ml.timeout-ms=${ML_TIMEOUT_MS:3000}

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/breast_cancer_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health,info

# Swagger
springdoc.swagger-ui.path=/swagger
springdoc.api-docs.path=/v3/api-docs